name: Nightly multi-arch image build

on:
  schedule:
    - cron: '0 0 * * *'  # every night at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: nightly-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 nightly image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:nightly-x86_64
            ghcr.io/${{ github.repository }}:nightly-${{ github.run_number }}-x86_64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:nightly-x86_64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:nightly-x86_64,mode=max

      - name: Build and push arm64 nightly image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:nightly-arm64
            ghcr.io/${{ github.repository }}:nightly-${{ github.run_number }}-arm64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:nightly-arm64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:nightly-arm64,mode=max
